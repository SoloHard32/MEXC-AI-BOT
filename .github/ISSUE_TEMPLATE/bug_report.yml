name: Bug report
description: Report a reproducible bug
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps
      placeholder: |
        1. Start bot in training mode
        2. Open live window
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v1.0.0 or commit hash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
      description: Remove secrets/API keys before posting
